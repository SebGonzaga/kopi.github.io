<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRĀV | Tanauan</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <section id="hero">
        <div class="hero-content">
            <p class="subtitle">Artisanal Coffee & Kitchen</p>
            <h1>KRĀV<span>.</span></h1>
            <div class="hero-btns">
                <a href="#menu" class="btn-primary">View Menu</a>
                <a href="#location" class="btn-outline">Visit Us</a>
            </div>
        </div>
    </section>

    <section class="promo-bar">
        <div class="promo-content">
            <span class="tag">PROMO</span>
            <p><strong>Barkada Bundle:</strong> Buy 1 Get 1 on all Signature Lattes every Tuesday!</p>
        </div>
    </section>

    <section id="menu" class="container">
        <div class="section-header">
            <h2>The Menu</h2>
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="coffee">Coffee</button>
                <button class="filter-btn" data-filter="food">Food</button>
            </div>
        </div>

        <div class="bento-grid" id="menu-grid">
            </div>
    </section>

    <div id="ai-trigger">
        <i data-lucide="message-square"></i>
    </div>

    <script src="script.js"></script>
</body>
</html>
